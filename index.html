<!doctype html><html><head><meta charset='utf-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>Gas Station Simulator AI</title><style>body{font-family:system-ui;max-width:920px;margin:20px auto;padding:0 14px;background:#0b1020;color:#e8eeff}.g{display:grid;grid-template-columns:1fr 1fr;gap:10px}input,select{width:100%;padding:9px;border-radius:8px;border:1px solid #2b3d76;background:#111938;color:#e8eeff}button{margin-top:10px;background:#5d85ff;color:#fff;border:0;padding:10px 14px;border-radius:8px;font-weight:700}.out{white-space:pre-wrap;margin-top:12px;padding:12px;border:1px solid #2b3d76;border-radius:8px;background:#10182e}</style></head><body><h1>Gas Station Simulator AI</h1><p>Sim your station and get AI strategy moves in real time.</p><div class='g'><div><label>Fuel price ($/gal)</label><input id='price' value='3.59'></div><div><label>Inventory level (%)</label><input id='inv' value='62'></div><div><label>Queue length (cars)</label><input id='queue' value='9'></div><div><label>Weather</label><select id='weather'><option>Sunny</option><option>Rain</option><option>Snow</option></select></div><div><label>Cash ($)</label><input id='cash' value='2400'></div></div><button id='go'>Get AI Strategy</button><div id='out' class='out'>Output appears here.</div><script>go.onclick=async()=>{out.textContent='Thinking...';const body={fuelPrice:price.value,inventory:inv.value,queue:queue.value,weather:weather.value,cash:cash.value};const r=await fetch('/api/advice',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});const d=await r.json();out.textContent=r.ok?(d.content||'(empty)'):`Error: ${d.error||'request failed'}`;};</script></body></html>
